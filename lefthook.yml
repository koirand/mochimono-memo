pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: '*.{ts,js,svelte,css,json,md,yaml,yml,html}'
      run: npx prettier --check {staged_files}

    - name: eslint
      glob: '*.{ts,js,svelte}'
      run: npx eslint {staged_files}

    - name: svelte-check
      glob: '*.{ts,svelte}'
      run: npx svelte-check --tsconfig tsconfig.json
